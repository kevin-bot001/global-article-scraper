steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}'

  # Step 3: Update Cloud Run Job with new image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'update-job'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Check if Job exists
        if gcloud run jobs describe ${_JOB_NAME} --region=${_REGION} 2>/dev/null; then
          echo "Updating existing Cloud Run Job..."
          gcloud run jobs update ${_JOB_NAME} \
            --region=${_REGION} \
            --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}
        else
          echo "Creating new Cloud Run Job..."
          gcloud run jobs create ${_JOB_NAME} \
            --region=${_REGION} \
            --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA} \
            --memory=${_MEMORY} \
            --cpu=${_CPU} \
            --task-timeout=${_TASK_TIMEOUT} \
            --max-retries=1 \
            --parallelism=1
        fi

# Substitution variables (override via trigger or CLI)
substitutions:
  _REGION: 'asia-southeast2'
  _AR_REPO: 'maomao-docker'
  _IMAGE_NAME: 'article-scraper'
  _JOB_NAME: 'article-scraper'
  _MEMORY: '2Gi'
  _CPU: '2'
  _TASK_TIMEOUT: '3600s'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
